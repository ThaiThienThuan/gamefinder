version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: gamematch-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: gamematch
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematch-net

  redis:
    image: redis:7-alpine
    container_name: gamematch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematch-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gamematch-api
    ports:
      - "4000:4000"
      - "30000-30100:30000-30100/udp"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://root:password@mongo:27017/gamematch?authSource=admin
      PORT: 4000
      JWT_SECRET: your-jwt-secret-min-32-chars-change-in-prod
      JWT_EXPIRY: 7d
      MAX_FILE_SIZE_MB: 50
      UPLOAD_DIR: ./uploads
      ALLOWED_ORIGIN: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      coturn:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematch-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gamematch-client
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - gamematch-net

  nginx:
    image: nginx:alpine
    container_name: gamematch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api
      - client
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematch-net

  # [REDIS_PLACEHOLDER] - Uncomment in Phase C
  # redis:
  #   image: redis:7-alpine
  #   container_name: gamematch-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - gamematch-net

  coturn:
    image: coturn/coturn:latest
    container_name: gamematch-coturn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "30000-30100:30000-30100/udp"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - gamematch-net

volumes:
  mongo_data:
  redis_data:

networks:
  gamematch-net:
    driver: bridge
