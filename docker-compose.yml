version: '3.8'

# Dev-only — production deploys to Render (api) + Vercel (client) + MongoDB Atlas + Upstash Redis.

services:
  mongo:
    image: mongo:6
    container_name: gamematching-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: gamematching
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematching-net

  redis:
    image: redis:7-alpine
    container_name: gamematching-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematching-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gamematching-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://root:password@mongo:27017/gamematch?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-min-32-characters-change-in-prod
      JWT_EXPIRY: 7d
      MAX_FILE_SIZE_MB: 50
      UPLOAD_DIR: ./uploads
      ALLOWED_ORIGIN: http://localhost:5173,http://localhost:3000
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:4000/api/auth/google/callback}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamematching-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gamematching-client
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_LIVEKIT_URL: ${LIVEKIT_URL:-}
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - gamematching-net

  nginx:
    image: nginx:alpine
    container_name: gamematching-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api
      - client
    networks:
      - gamematching-net

volumes:
  mongo_data:
  redis_data:

networks:
  gamematching-net:
    driver: bridge
