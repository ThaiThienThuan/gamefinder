# [MEDIASOUP_PLACEHOLDER] - coturn TURN server configuration
# This file will be fully configured in Phase D with complete TURN settings

# Listening ports
listening-port=3478
alt-listening-port=3479
listening-ip=0.0.0.0
tls-listening-port=5349
alt-tls-listening-port=5350

# STUN/TURN
realm=gamematch.local
server-name=gamematch.local

# [MEDIASOUP_PLACEHOLDER] - Add authentication credentials in Phase D
# user=username:password

# Performance
max-bps=0
bps-capacity=0
mcps=10000
user-quota=0
total-quota=0

# Security
verbose
log-file=/var/log/coturn/coturn.log
pidfile=/var/run/coturn.pid

# [MEDIASOUP_PLACEHOLDER] - Add external IP configuration in Phase D
# external-ip=0.0.0.0

# [MEDIASOUP_PLACEHOLDER] - Enable TLS in Phase D
# cert=/etc/coturn/certs/cert.pem
# pkey=/etc/coturn/certs/pkey.pem

# [MEDIASOUP_PLACEHOLDER] - Configure TURN secret in Phase D
# turn-tls-alternate-port=5349
# no-loopback-peers
# no-multicast-peers
